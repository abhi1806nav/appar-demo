<!DOCTYPE html>
<html>
<head>
  <title>APAAR Verification Demo</title>
</head>
<body>

  <h2>APAAR Verification Demo</h2>

  <form id="form">
    <input id="apaar_id" placeholder="APAAR ID" required>
    <br><br>

    <input id="name" placeholder="Student Name" required>
    <br><br>

    <input id="year_of_birth" placeholder="Year of Birth" required>
    <br><br>

    <select id="gender" required>
      <option value="">Select Gender</option>
      <option value="M">Male</option>
      <option value="F">Female</option>
      <option value="T">Transgender</option>
    </select>
    <br><br>

    <input id="place" placeholder="Consent Place" value="Delhi">
    <br><br>

    <button type="submit">Verify APAAR</button>
  </form>

  <h3>Response</h3>
  <pre id="result"></pre>

  <script>
    document.getElementById("form").addEventListener("submit", async function(e) {
      e.preventDefault();

      document.getElementById("result").innerText = "Loading...";

      const response = await fetch("/verify", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          apaar_id: document.getElementById("apaar_id").value,
          name: document.getElementById("name").value,
          year_of_birth: document.getElementById("year_of_birth").value,
          gender: document.getElementById("gender").value,
          place: document.getElementById("place").value
        })
      });

      const data = await response.json();

      document.getElementById("result").innerText =
        JSON.stringify(data, null, 2);
    });
  </script>

</body>
</html>
