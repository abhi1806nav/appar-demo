<!DOCTYPE html>
<html>
<head>
  <title>ABC/APAAR ID Verification</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(rgba(0,0,0,.65), rgba(0,0,0,.65)),
        url("https://images.unsplash.com/photo-1562774053-701939374585?q=80&w=1600");
      background-size: cover;
      background-position: center;
      min-height: 100vh;
    }

    .card {
      background: white;
      width: 720px;
      max-width: 92%;
      margin: 35px auto;
      padding: 35px;
      border-radius: 12px;
      box-shadow: 0 8px 30px rgba(0,0,0,.35);
    }

    h1, h2, h3 {
      text-align: center;
      margin: 5px 0;
    }

    h1 {
      color: #b32020;
      font-size: 26px;
    }

    h2 {
      font-size: 22px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      margin-top: 25px;
    }

    label {
      font-weight: bold;
      display: block;
      margin-bottom: 6px;
    }

    input, select {
      width: 100%;
      padding: 11px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 15px;
      box-sizing: border-box;
    }

    .hint {
      font-size: 12px;
      color: #555;
      margin-top: 4px;
    }

    .consent-box {
      margin-top: 25px;
      padding: 15px;
      background: #f7f7f7;
      border-radius: 8px;
    }

    .radio-row {
      display: flex;
      gap: 20px;
      margin: 10px 0;
      align-items: center;
    }

    .radio-row label {
      font-weight: normal;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    button {
      width: 100%;
      margin-top: 25px;
      padding: 14px;
      background: #c7352c;
      color: white;
      border: 0;
      border-radius: 4px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
    }

    button:disabled {
      background: #999;
      cursor: not-allowed;
    }

    .result-card {
      margin-top: 25px;
      padding: 20px;
      border-radius: 8px;
      background: #f1fff1;
      border: 1px solid #8bd68b;
    }

    .error-card {
      margin-top: 25px;
      padding: 20px;
      border-radius: 8px;
      background: #fff1f1;
      border: 1px solid #e19b9b;
      color: #9b0000;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }

    td {
      border: 1px solid #ddd;
      padding: 10px;
    }

    td:first-child {
      font-weight: bold;
      width: 40%;
      background: #f7f7f7;
    }

    .next-form {
      margin-top: 25px;
      padding-top: 20px;
      border-top: 1px solid #ddd;
    }

    .note {
      color: #c7352c;
      font-size: 13px;
      margin-top: 12px;
    }

    @media(max-width: 700px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>XYZ University</h1>
    <h2>ABC/APAAR ID Verification</h2>
    <h3>For Candidate Registration</h3>

    <form id="verifyForm">

      <div class="grid">
        <div>
          <label>ABC/APAAR ID *</label>
          <input id="apaar_id" maxlength="12" required placeholder="Enter 12 digit ABC/APAAR ID">
          <div class="hint">Only 12 digit numerical value allowed.</div>
        </div>

        <div>
          <label>Name *</label>
          <input id="name" required placeholder="Name as per Aadhaar">
          <div class="hint">Enter name as per Aadhaar.</div>
        </div>

        <div>
          <label>Year of Birth *</label>
          <select id="year_of_birth" required></select>
          <div class="hint">Year of birth as per Aadhaar.</div>
        </div>

        <div>
          <label>Gender *</label>
          <select id="gender" required>
            <option value="">Select Gender</option>
            <option value="M">Male</option>
            <option value="F">Female</option>
            <option value="T">Transgender</option>
          </select>
          <div class="hint">Gender as per Aadhaar.</div>
        </div>
      </div>

      <div class="consent-box">
        <label>Consent Provided By *</label>

        <div class="radio-row">
          <label>
            <input type="radio" name="consent_relation" value="Self" checked>
            SELF
          </label>

          <label>
            <input type="radio" name="consent_relation" value="Guardian">
            Other
          </label>
        </div>

        <p>
          <input type="checkbox" id="consent_check" required>
          I am providing consent to verify my details against the APAAR ID.
        </p>

        <div class="grid">
          <div>
            <label>Consent Provider Name *</label>
            <input id="provider_name" required>
          </div>

          <div>
            <label>Provider Authentication Mode *</label>
            <select id="authentication_mode" required>
              <option value="UID">UID</option>
              <option value="PAN">PAN</option>
              <option value="EPIC">EPIC</option>
              <option value="DL">DL</option>
              <option value="PASSPORT">PASSPORT</option>
            </select>
          </div>

          <div>
            <label>Provider Authentication ID No *</label>
            <input id="authentication_id_no" required placeholder="Enter ID number">
          </div>

          <div>
            <label>Consent Place *</label>
            <input id="place" value="Delhi" required>
          </div>

          <div>
            <label>Consent Date</label>
            <input id="consent_date" readonly>
          </div>

          <div>
            <label>Consent Time</label>
            <input id="consent_time" readonly>
          </div>
        </div>
      </div>

      <button id="verifyBtn" type="submit">Verify the Details</button>
    </form>

    <div id="responseArea"></div>
  </div>

<script>
  const yearSelect = document.getElementById("year_of_birth");

  for (let y = 2026; y >= 1950; y--) {
    const opt = document.createElement("option");
    opt.value = y;
    opt.textContent = y;
    yearSelect.appendChild(opt);
  }

  function setDateTime() {
    const now = new Date();

    const date =
      String(now.getDate()).padStart(2, "0") + "/" +
      String(now.getMonth() + 1).padStart(2, "0") + "/" +
      now.getFullYear();

    const time =
      String(now.getHours()).padStart(2, "0") + ":" +
      String(now.getMinutes()).padStart(2, "0") + ":" +
      String(now.getSeconds()).padStart(2, "0");

    document.getElementById("consent_date").value = date;
    document.getElementById("consent_time").value = time;
  }

  setDateTime();
  setInterval(setDateTime, 1000);

  function autoFillSelf() {
    const relation =
      document.querySelector("input[name='consent_relation']:checked").value;

    if (relation === "Self") {
      document.getElementById("provider_name").value =
        document.getElementById("name").value;

      document.getElementById("authentication_mode").value = "UID";

      document.getElementById("authentication_id_no").value =
        document.getElementById("apaar_id").value;
    }
  }

  document.getElementById("name").addEventListener("input", autoFillSelf);
  document.getElementById("apaar_id").addEventListener("input", function() {
    this.value = this.value.replace(/\D/g, "").slice(0, 12);
    autoFillSelf();
  });

  document.querySelectorAll("input[name='consent_relation']").forEach(radio => {
    radio.addEventListener("change", function() {
      if (this.value === "Self") {
        autoFillSelf();
      } else {
        document.getElementById("provider_name").value = "";
        document.getElementById("authentication_mode").value = "UID";
        document.getElementById("authentication_id_no").value = "";
      }
    });
  });

  document.getElementById("verifyForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const apaarId = document.getElementById("apaar_id").value;

    if (!/^[0-9]{12}$/.test(apaarId)) {
      alert("ABC/APAAR ID must be exactly 12 digits.");
      return;
    }

    const btn = document.getElementById("verifyBtn");
    const responseArea = document.getElementById("responseArea");

    btn.disabled = true;
    btn.innerText = "Verifying...";
    responseArea.innerHTML = "";

    const payload = {
      apaar_id: apaarId,
      name: document.getElementById("name").value,
      year_of_birth: document.getElementById("year_of_birth").value,
      gender: document.getElementById("gender").value,
      consent_relation: document.querySelector("input[name='consent_relation']:checked").value,
      provider_name: document.getElementById("provider_name").value,
      authentication_mode: document.getElementById("authentication_mode").value,
      authentication_id_no: document.getElementById("authentication_id_no").value,
      consent_date: document.getElementById("consent_date").value,
      consent_time: document.getElementById("consent_time").value,
      place: document.getElementById("place").value
    };

    try {
      const response = await fetch("/verify", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(payload)
      });

      const data = await response.json();
      const apiData = Array.isArray(data.response) ? data.response[0] : data.response;

      if (data.success && apiData && apiData.status === "success") {
        responseArea.innerHTML = `
          <div class="result-card">
            <h3>Information received from ABC/APAAR ID Verification System</h3>

            <table>
              <tr><td>ABC Account ID</td><td>${apiData.ABC_ACCOUNT_ID || ""}</td></tr>
              <tr><td>Name</td><td>${apiData.CNAME || ""}</td></tr>
              <tr><td>Gender</td><td>${apiData.GENDER || ""}</td></tr>
              <tr><td>DOB</td><td>${apiData.DOB || ""}</td></tr>
              <tr><td>University Name</td><td>${apiData.UNIVERSITY_NAME || ""}</td></tr>
              <tr><td>Course Name</td><td>${apiData.COURSE_NAME || ""}</td></tr>
              <tr><td>Program Name</td><td>${apiData.PROGRAM_NAME || ""}</td></tr>
              <tr><td>Enrollment No</td><td>${apiData.ENROLLMENT_NO || ""}</td></tr>
              <tr><td>Roll No</td><td>${apiData.ROLL_NO || ""}</td></tr>
              <tr><td>Registration No</td><td>${apiData.REGN_NO || ""}</td></tr>
            </table>

            <div class="next-form">
              <h3>Candidate Registration Details</h3>

              <div class="grid">
                <div>
                  <label>Email</label>
                  <input placeholder="Enter email">
                </div>

                <div>
                  <label>Mobile Number</label>
                  <input placeholder="Enter mobile number">
                </div>

                <div>
                  <label>Father / Guardian Name</label>
                  <input placeholder="Enter father/guardian name">
                </div>

                <div>
                  <label>Address</label>
                  <input placeholder="Enter address">
                </div>
              </div>

              <button type="button">NEXT</button>
            </div>
          </div>
        `;
      } else {
        responseArea.innerHTML = `
          <div class="error-card">
            <h3>Verification Failed</h3>
            <pre>${JSON.stringify(data.error || data.response || data, null, 2)}</pre>
          </div>
        `;
      }

    } catch (err) {
      responseArea.innerHTML = `
        <div class="error-card">
          <h3>Error</h3>
          <pre>${err.message}</pre>
        </div>
      `;
    }

    btn.disabled = false;
    btn.innerText = "Verify the Details";
  });
</script>

</body>
</html>
